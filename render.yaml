databases:
  - name: apnileap-db
    databaseName: apnileap
    user: apnileap
    plan: free

services:
  # ── Backend: NestJS API ────────────────────────────────────────────────────
  - type: web
    name: apnileap-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: apnileap-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: KEYCLOAK_BASE_URL
        sync: false
      - key: KEYCLOAK_REALM
        value: apnileap
      - key: KEYCLOAK_CLIENT_ID
        value: apnileap-backend
      - key: KEYCLOAK_CLIENT_SECRET
        value: mock-secret
      - key: GITLAB_BASE_URL
        value: https://gitlab.com
      - key: GITLAB_TOKEN
        sync: false
      - key: GITLAB_GROUP_ID
        value: "1"
      - key: WIKIJ_BASE_URL
        value: http://localhost:8082
      - key: WIKIJ_API_TOKEN
        value: mock-token
      - key: REDIS_URL
        value: rediss://red-d952injtqb8s73eav0g0:pmchON9bQYNHsFNZm755CaS7BQryGavg@oregon-keyvalue.render.com:6379
      - key: MINIO_ENDPOINT
        value: localhost
      - key: MINIO_PORT
        value: 9000
      - key: MINIO_ACCESS_KEY
        value: mock-key
      - key: MINIO_SECRET_KEY
        value: mock-secret
      - key: MINIO_USE_SSL
        value: false
      - key: N8N_WEBHOOK_URL
        value: http://localhost:5678
      - key: SMTP_HOST
        value: smtp.example.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        value: mock-user
      - key: SMTP_PASS
        value: mock-pass

  # ── Frontend: React Static Site ────────────────────────────────────────────
  - type: web
    name: apnileap-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: build
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: apnileap-backend
          envVarKey: RENDER_EXTERNAL_URL
