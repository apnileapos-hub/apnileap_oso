services:
  - type: web
    name: apnileapos
    env: node
    plan: free
    buildCommand: node build.js
    startCommand: node backend/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # Set this to your PostgreSQL Connection String in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render will automatically generate a secure session key
      - key: JIRA_EMAIL
        sync: false          # Set your Atlassian Email in Render dashboard
      - key: JIRA_API_TOKEN
        sync: false          # Set your Atlassian API Token in Render dashboard
      - key: JIRA_BASE_URL
        value: https://apnileapos.atlassian.net
      - key: ATLASSIAN_ORG_ID
        value: 3e8909b9-234a-4def-aaf9-adc97997b269
      - key: GITHUB_TOKEN
        sync: false          # Optional: GitHub PAT for automated repository creation
      - key: GITHUB_ORG
        value: apnileapos-hub
