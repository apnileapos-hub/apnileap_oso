apiVersion: v1
kind: Namespace
metadata:
  name: apnileap
---
# PostgreSQL Database Manifests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-postgres
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          value: "apnileap"
        - name: POSTGRES_PASSWORD
          value: "apnileap_db_pass"
        - name: POSTGRES_DB
          value: "apnileap_dev"
        ports:
        - containerPort: 5432
          name: postgres
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: apnileap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: apnileap
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
# Redis Manifests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-redis
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: apnileap
spec:
  ports:
  - port: 6379
  selector:
    app: redis
---
# RabbitMQ Manifests
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-rabbitmq
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:3-management-alpine
        ports:
        - containerPort: 5672
          name: amqp
        - containerPort: 15672
          name: management
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: apnileap
spec:
  ports:
  - port: 5672
    name: amqp
  - port: 15672
    name: management
  selector:
    app: rabbitmq
---
# MinIO Storage Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-minio
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args: ["server", "/data", "--console-address", ":9001"]
        env:
        - name: MINIO_ROOT_USER
          value: "minioadmin"
        - name: MINIO_ROOT_PASSWORD
          value: "minioadmin"
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        volumeMounts:
        - name: minio-storage
          mountPath: /data
      volumes:
      - name: minio-storage
        persistentVolumeClaim:
          claimName: minio-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: apnileap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: minio-service
  namespace: apnileap
spec:
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console
  selector:
    app: minio
---
# BookStack Wiki Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-bookstack
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bookstack
  template:
    metadata:
      labels:
        app: bookstack
    spec:
      containers:
      - name: bookstack
        image: lscr.io/linuxserver/bookstack:latest
        ports:
        - containerPort: 80
          name: http
        env:
        - name: APP_URL
          value: "http://bookstack-service.apnileap.svc.cluster.local"
        - name: DB_HOST
          value: "postgres"
        - name: DB_USER
          value: "apnileap"
        - name: DB_PASS
          value: "apnileap_db_pass"
        - name: DB_DATABASE
          value: "apnileap_dev"
---
apiVersion: v1
kind: Service
metadata:
  name: bookstack-service
  namespace: apnileap
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: bookstack
---
# Keycloak SSO Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-keycloak
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0
        args: ["start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        ports:
        - containerPort: 8080
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: apnileap
spec:
  ports:
  - port: 8081
    targetPort: 8080
  selector:
    app: keycloak
---
# n8n Workflow Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-n8n
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  template:
    metadata:
      labels:
        app: n8n
    spec:
      containers:
      - name: n8n
        image: docker.n8n.io/n8nio/n8n:latest
        env:
        - name: N8N_HOST
          value: "n8n-service"
        - name: DB_TYPE
          value: "postgresdb"
        - name: DB_POSTGRESDB_HOST
          value: "postgres"
        - name: DB_POSTGRESDB_DATABASE
          value: "apnileap_dev"
        - name: DB_POSTGRESDB_USER
          value: "apnileap"
        - name: DB_POSTGRESDB_PASSWORD
          value: "apnileap_db_pass"
        ports:
        - containerPort: 5678
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: n8n-service
  namespace: apnileap
spec:
  ports:
  - port: 5678
    targetPort: 5678
  selector:
    app: n8n
---
# GitLab CE Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-gitlab
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitlab
  template:
    metadata:
      labels:
        app: gitlab
    spec:
      containers:
      - name: gitlab
        image: gitlab/gitlab-ce:16.10.0-ce.0
        env:
        - name: GITLAB_OMNIBUS_CONFIG
          value: |
            external_url 'http://gitlab-service'
            nginx['listen_port'] = 80
            nginx['listen_https'] = false
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: gitlab-data
          mountPath: /var/opt/gitlab
      volumes:
      - name: gitlab-data
        persistentVolumeClaim:
          claimName: gitlab-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitlab-pvc
  namespace: apnileap
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: gitlab-service
  namespace: apnileap
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: gitlab
---
# Observability Logging (Loki)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apnileap-loki
  namespace: apnileap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:latest
        ports:
        - containerPort: 3100
          name: http
---
apiVersion: v1
kind: Service
metadata:
  name: loki-service
  namespace: apnileap
spec:
  ports:
  - port: 3100
    targetPort: 3100
  selector:
    app: loki
